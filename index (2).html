<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Чат-бот</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#282828;font-family:Arial,sans-serif}

    body{
      display:flex;
      justify-content:center;
      padding:40px 20px 20px;
      min-height:100vh;
    }

    .page{
      width:100%;
      max-width:700px;
      display:flex;
      flex-direction:column;
    }

    h1{
      font-family:Georgia,serif;
      font-weight:700;
      font-size:54px;
      color:#fff;
      margin-bottom:18px;
    }

    /* chat box */
    .chat-box{
      border:1px solid #ededed;
      border-radius:36px;
      display:flex;
      flex-direction:column;
      height:680px;
      overflow:hidden;
    }

    /* messages — column-reverse so new msgs appear at top visually bottom */
    .messages{
      flex:1;
      overflow-y:auto;
      padding:18px 18px 10px;
      display:flex;
      flex-direction:column-reverse;
      gap:14px;
    }
    .messages::-webkit-scrollbar{width:4px}
    .messages::-webkit-scrollbar-thumb{background:#555;border-radius:2px}

    /* row */
    .row{display:flex;align-items:flex-start;gap:10px}

    /* avatar */
    .av{
      width:52px;height:52px;
      border-radius:50%;
      flex-shrink:0;
      overflow:hidden;
      background:#ddd;
    }
    .av img{width:100%;height:100%;object-fit:cover;display:block}

    /* bubble */
    .bbl{
      border-radius:26px;
      padding:12px 18px;
      font-size:16px;
      line-height:1.45;
      word-break:break-word;
      max-width:calc(100% - 66px);
    }
    .bbl-u{background:#f9c35b;color:#1a1a1a}
    .bbl-b{background:#f3f3f3;color:#1a1a1a}

    /* typing */
    .typing{
      display:flex;align-items:center;gap:5px;
      padding:12px 18px;
      background:#f3f3f3;
      border-radius:26px;
    }
    .typing span{
      width:8px;height:8px;background:#aaa;
      border-radius:50%;
      animation:bop 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes bop{
      0%,80%,100%{transform:translateY(0);opacity:.4}
      40%{transform:translateY(-6px);opacity:1}
    }

    /* input bar */
    .input-bar{
      flex-shrink:0;
      background:#f3f3f3;
      border-radius:0 0 36px 36px;
      display:flex;
      align-items:center;
      padding:10px 14px;
      gap:8px;
      min-height:58px;
    }
    .inp{
      flex:1;border:none;outline:none;
      background:transparent;
      font-size:18px;color:#1a1a1a;
      font-family:Arial,sans-serif;
    }
    .inp::placeholder{color:#929292;letter-spacing:3px}

    .btn-send{
      width:36px;height:36px;
      border:none;background:transparent;
      cursor:pointer;display:flex;
      align-items:center;justify-content:center;
      padding:0;flex-shrink:0;
    }
    .btn-send svg{width:22px;height:22px;transition:fill .2s}
    .btn-send:disabled svg{fill:#b0b0b0}
    .btn-send:not(:disabled) svg{fill:#f9c35b}

    /* mobile */
    @media(max-width:600px){
      body{padding:0}
      .page{height:100dvh;max-width:100%}
      h1{font-size:30px;padding:14px 14px 10px;margin-bottom:0}
      .chat-box{flex:1;border:none;border-radius:0;height:auto}
      .messages{padding:10px 10px 8px}
      .av{width:44px;height:44px}
      .bbl{font-size:15px;padding:10px 14px}
      .input-bar{border-radius:0;padding:8px 12px}
    }
  </style>
</head>
<body>
<div class="page">
  <h1>Чат-бот</h1>
  <div class="chat-box">
    <div class="messages" id="msgs"></div>
    <div class="input-bar">
      <input class="inp" id="inp" type="text" placeholder="..." autocomplete="off"/>
      <button class="btn-send" id="btn" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <path d="M476 3.2L12.5 270.6c-18.1 10.4-15.8 35.6 2.2 43.2L121 358.4l287.3-253.2c5.5-4.9 13.3 2.6 8.6 8.3L176 407v80.5c0 23.6 28.5 32.9 42.5 15.8L282 426l124.6 52.2c14.2 6 30.4-2.9 33-18.2l72-432C515 7.8 493.3-6.8 476 3.2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

const msgsEl = document.getElementById('msgs');
const inpEl  = document.getElementById('inp');
const btnEl  = document.getElementById('btn');

// state
const S = {
  stage: 'await_start',
  userName: '',
  numbers: [],
  vars: { ans: null },
  history: [],
  hIdx: -1,
};

// input
inpEl.addEventListener('input', () => { btnEl.disabled = !inpEl.value.trim(); });
inpEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !btnEl.disabled) { send(); return; }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (!S.history.length) return;
    if (S.hIdx < S.history.length - 1) S.hIdx++;
    inpEl.value = S.history[S.history.length - 1 - S.hIdx];
    btnEl.disabled = false;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (S.hIdx <= 0) { S.hIdx = -1; inpEl.value = ''; btnEl.disabled = true; return; }
    S.hIdx--;
    inpEl.value = S.history[S.history.length - 1 - S.hIdx];
  }
});
btnEl.addEventListener('click', send);

function send() {
  const txt = inpEl.value.trim();
  if (!txt) return;
  S.history.push(txt); S.hIdx = -1;
  addMsg(txt, 'u');
  inpEl.value = ''; btnEl.disabled = true;
  let typRow = showTyping();
  setTimeout(() => {
    typRow.remove();
    const r = process(txt);
    if (r) addMsg(r, 'b');
  }, 700 + Math.random()*400);
}

function addMsg(txt, who) {
  const row = document.createElement('div');
  row.className = 'row';
  row.dataset.who = who;

  const av = document.createElement('div');
  av.className = 'av';
  const im = document.createElement('img');
  im.src = who === 'u' ? USER_SRC : BOT_SRC;
  im.alt = who === 'u' ? 'Вы' : 'Бот';
  av.appendChild(im);

  const bb = document.createElement('div');
  bb.className = who === 'u' ? 'bbl bbl-u' : 'bbl bbl-b';
  bb.textContent = txt;

  row.appendChild(av);
  row.appendChild(bb);
  msgsEl.prepend(row);
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'row';
  const av = document.createElement('div');
  av.className = 'av';
  const im = document.createElement('img');
  im.src = BOT_SRC; im.alt = 'Бот';
  av.appendChild(im);
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(av); row.appendChild(t);
  msgsEl.prepend(row);
  return row;
}

function undo() {
  const rows = [...msgsEl.querySelectorAll('.row')];
  let n = 0;
  for (let i = 0; i < rows.length && n < 2; i++) { rows[i].remove(); n++; }
  return n > 0 ? 'Последний обмен удалён.' : 'Нечего отменять.';
}

function parseNums(raw) {
  let s = raw;
  for (const [k,v] of Object.entries(S.vars))
    if (v !== null) s = s.replace(new RegExp('\b'+k+'\b','g'), String(v));
  const tokens = s.split(/[,;\s]+/).filter(Boolean);
  const res = [];
  for (const tok of tokens) {
    const rm = tok.match(/^(-?\d+)\.{2,3}(-?\d+)$/);
    if (rm) {
      const a = +rm[1], b = +rm[2];
      if (a > b) return {err:'Неверный формат ввода'};
      for (let n = a; n <= b; n++) res.push(n);
      continue;
    }
    if (/^-?\d+$/.test(tok)) { res.push(+tok); continue; }
    return {err:'Вводите только целые числа'};
  }
  if (!res.length) return {err:'Нет чисел'};
  return {nums: res};
}

function gcd(a,b){ a=Math.abs(a);b=Math.abs(b); while(b){const t=b;b=a%b;a=t} return a; }

function calc(op, ns) {
  if (op==='+') return ns.reduce((a,b)=>a+b);
  if (op==='-') return ns.reduce((a,b)=>a-b);
  if (op==='*') return ns.reduce((a,b)=>a*b);
  if (op==='/') {
    if (ns.slice(1).some(n=>n===0)) return null;
    return parseFloat(ns.reduce((a,b)=>a/b).toFixed(4));
  }
  if (op==='min') return Math.min(...ns);
  if (op==='max') return Math.max(...ns);
  if (op==='avg') return parseFloat((ns.reduce((a,b)=>a+b)/ns.length).toFixed(4));
  if (op==='gcd') return ns.reduce((a,b)=>gcd(a,b));
}

function process(inp) {
  const t = inp.trim();
  if (/^\/undo$/i.test(t)) return undo();
  if (/^\/start$/i.test(t)) { S.stage='await_name'; return 'Привет, меня зовут Чат-бот, а как зовут тебя?'; }
  if (/^\/stop$/i.test(t)) {
    S.stage='await_start'; S.userName=''; S.numbers=[]; S.vars={ans:null};
    return 'Всего доброго, если хочешь поговорить пиши /start';
  }
  const nm = t.match(/^\/name:\s*(.+)$/i);
  if (nm) {
    if (S.stage==='await_start') return 'Введите команду /start, для начала общения';
    S.userName=nm[1].trim(); S.stage='ready';
    return 'Привет '+S.userName+', приятно познакомиться. Я умею считать, введи числа которые надо посчитать';
  }
  const sm = t.match(/^\/set:\s*([a-zA-Z_]\w*)\s*=\s*(-?\d+)$/i);
  if (sm) {
    if (S.stage==='await_start'||S.stage==='await_name') return 'Введите команду /start, для начала общения';
    S.vars[sm[1]] = +sm[2];
    return 'Переменная '+sm[1]+' = '+sm[2]+' сохранена';
  }
  const num = t.match(/^\/numbers:\s*(.+)$/i);
  if (num) {
    if (S.stage==='await_start'||S.stage==='await_name') return 'Введите команду /start, для начала общения';
    const p = parseNums(num[1]);
    if (p.err) return p.err;
    S.numbers=p.nums; S.stage='await_operation';
    return 'Числа приняты. Введи действие: +, -, *, /, gcd, avg, min, max';
  }
  if (S.stage==='await_operation') {
    const ops=['+','-','*','/','gcd','avg','min','max'];
    if (ops.includes(t)) {
      const r = calc(t, S.numbers);
      if (r===null) { S.stage='ready'; return 'Ошибка: деление на ноль'; }
      S.vars.ans=r; S.stage='ready';
      return 'Результат: '+r;
    }
  }
  if (S.stage==='await_start'||S.stage==='await_name') return 'Введите команду /start, для начала общения';
  return 'Я не понимаю, введите другую команду!';
}
