<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чат-бот</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <h1 class="page-title">Чат-бот</h1>
    <div class="chat-wrapper">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <div class="input-box">
          <input
            type="text"
            id="messageInput"
            class="input-field"
            placeholder="..."
            autocomplete="off"
          />
          <button class="send-btn" id="sendBtn" disabled>
            <img src="assets/paper-plane.svg" alt="Отправить" />
          </button>
        </div>
      </div>
    </div>
  </div>
  <script src="bot.js"></script>
</body>
</html>
